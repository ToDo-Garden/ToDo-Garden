name: Test

on:
  pull_request:

jobs:
  build:
    runs-on: macOS-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run tests
        run: make test
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
            xcode: true
            xcode_archive_path: "ToDo-Garden.xcresult"
            token: ${{ secrets.CODECOV_TOKEN }}
            slug: ToDo-Garden/ToDo-Garden
